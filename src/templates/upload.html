{% extends "base.html" %}

{% block head %}
    {{ super() }}
    <link rel="stylesheet" href="/public/styles/upload.css" />
{% endblock head %}

{% block body %}
    <form id="form_meme_post" action="{{endpoint}}" method="post" enctype="multipart/form-data">
        <div>
          <label for="file">Meme:</label>
          <input
            type="file"
            id="file"
            name="file"
            accept="image/*"
            required
          />
        </div>
      <p>El archivo no puedo ser mayor a 2MB</p>
      <button type="submit">SUBIR</button>
    </form>

    <script>
        const form = document.getElementById("form_meme_post");
        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            showNotification("info", "Verificando si es un meme kuka...");

            const body = new FormData(form);

             try {
                const response = await fetch(form.action, {
                    method: "POST",
                    body,
                });

                if (!response.ok) {
                    console.log(response)
                    switch (response.status) {
                        case 413: {
                            showNotification("error", "El meme es muy grande, metele motosierra");
                        }
                        default: {
                            showNotification("error", response.statusText);
                        }
                    }
                    return;
                }

                window.location.href = "/";
            } catch {
                window.location.href = "/error";
            }
        })
    </script>
{% endblock body %}
