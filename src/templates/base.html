<!doctype html>
<html lang="en">
  <head>
    {% block head %}
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Los memes que likea El Javo" />
        <meta name="author" content="el_gordo_compu" />

        <meta property="og:title" content="Meme Libre" />
        <meta property="og:description" content="Los memes que likea El Javo" />
        <meta property="og:image" content="https://memelibre.com/public/assets/logo.png" />
        <meta property="og:url" content="https://memelibre.com/" />
        <meta property="og:type" content="website" />
        <meta property="og:locale" content="es_AR" />

        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Meme Libre" />
        <meta name="twitter:description" content="Los memes que likea El Javo" />
        <meta name="twitter:image" content="https://memelibre.com/public/assets/logo.png" />
        <meta name="twitter:site" content="@memelibre" />

        <title>Meme Libre</title>

        <link rel="icon" href="https://memelibre.com/public/assets/logo.png" type="image/png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
          href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
          rel="stylesheet"
        />
        <link rel="stylesheet" href="/public/styles/global.css" />
        <link rel="stylesheet" href="/public/styles/meme.css" />
        <link rel="stylesheet" href="/public/styles/navbar.css" />
        <link rel="stylesheet" href="/public/styles/notification.css" />
    {% endblock head %}
  </head>

  <body>
    <div id="notification-container" style="display: none">
      <p id="notification-text"></p>
      <p id="notification-btn">X</p>
    </div>
    {% include "_navbar.html" %}
    {% block body %}{% endblock body %}
  </body>

    <script>
      const notificationContainer = document.getElementById(
          "notification-container",
        );
      const notificationText = document.getElementById("notification-text");
      const notificationBtn = document.getElementById("notification-btn");

      let notificationTimeout;

      const showNotification = (type = "info", message = "") => {
        if (!notificationContainer || !notificationText || !notificationBtn) return;

        if (notificationTimeout) {
          clearTimeout(notificationTimeout);
        }

        notificationContainer.style.display = message ? "flex" : "none";
        switch (type) {
          case "error": {
            notificationContainer.style.backgroundColor = "var(--orange)";
            notificationText.textContent = "Error: " + message;
            break;
          }
          default: {
            notificationContainer.style.backgroundColor = "var(--yellow)";
            notificationText.textContent = "Info: " + message;
            break;
          }
        }

        notificationTimeout = setTimeout(() => {
          notificationContainer.style.display = "none";
        }, 3000);
      };

      notificationBtn.addEventListener("click", () => {
        notificationContainer.style.display = "none";
      });
    </script>
</html>
